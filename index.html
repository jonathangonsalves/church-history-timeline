<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linha do Tempo da Igreja Cristã</title>
  <style>
    :root {
      --cream:      #faf8f2;
      --cream-dark: #ede8d8;
      --ink:        #1e1008;
      --ink-soft:   #5c4030;
      --gold:       #c8a030;
      --gold-light: #f0d060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────── */
    #header {
      background: linear-gradient(135deg, #1e1008 0%, #3a1808 60%, #1e1008 100%);
      padding: 20px 28px 16px;
      text-align: center;
      border-bottom: 4px solid var(--gold);
    }
    #header h1 {
      font-size: clamp(0.95rem, 2.2vw, 1.5rem);
      color: var(--gold-light);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.3;
    }
    #header p {
      color: #c8b898;
      font-size: 0.82rem;
      margin-top: 5px;
      font-style: italic;
    }

    /* ── PERIOD TABS ─────────────────────────────── */
    #timeline-nav {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-bottom: 3px solid #ddd0b8;
      background: #f0ebe0;
    }
    #timeline-nav::-webkit-scrollbar { height: 3px; }
    #timeline-nav::-webkit-scrollbar-thumb { background: var(--gold); }

    #period-tabs {
      display: flex;
      min-width: max-content;
    }

    .period-tab {
      cursor: pointer;
      padding: 14px 22px 12px;
      border-right: 1px solid #ddd0b8;
      border-bottom: 4px solid transparent;
      transition: all 0.18s;
      user-select: none;
      text-align: center;
      white-space: nowrap;
      position: relative;
    }
    .period-tab:hover { filter: brightness(1.08); }
    .period-tab.active { border-bottom-color: var(--ink) !important; }
    .period-tab .tab-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
    .period-tab .tab-year { font-size: 1rem; font-weight: bold; display: block; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    .period-tab .tab-name { font-size: 0.62rem; display: block; color: rgba(255,255,255,0.85); margin-top: 1px; letter-spacing: 0.03em; }

    /* ── MAIN CONTENT ────────────────────────────── */
    #content-area {
      flex: 1;
      padding: 20px;
      max-width: none;
      width: 100%;
      overflow-x: auto;
    }

    /* Welcome state */
    #welcome {
      text-align: center;
      padding: 64px 20px;
      color: var(--ink-soft);
    }
    #welcome .w-icon { font-size: 4rem; margin-bottom: 18px; }
    #welcome h2 { font-size: 1.4rem; color: var(--ink); margin-bottom: 10px; }
    #welcome p { max-width: 400px; margin: 0 auto; line-height: 1.7; font-size: 0.9rem; }

    /* Period header */
    .period-header {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--cream-dark);
    }
    .period-header .ph-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
      border: 3px solid rgba(0,0,0,0.15);
    }
    .period-header h2 { font-size: 1.45rem; color: var(--ink); line-height: 1.2; }
    .period-header .ph-years { font-size: 0.82rem; color: var(--ink-soft); margin-top: 2px; font-style: italic; }
    .period-header .ph-theme { font-size: 0.85rem; color: var(--ink-soft); margin-top: 6px; line-height: 1.5; max-width: 600px; }

    /* Events grid */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }

    .event-card {
      background: white;
      border-radius: 10px;
      border: 1.5px solid #e0d8c8;
      padding: 18px 18px 14px;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
    }
    .event-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border-color: #c8a878;
    }
    .event-card .ec-stripe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 5px;
      border-radius: 10px 10px 0 0;
    }
    .event-card .ec-icon {
      font-size: 2rem;
      float: right;
      margin: 0 0 4px 10px;
      opacity: 0.75;
    }
    .event-card .ec-year {
      font-size: 0.72rem;
      font-weight: bold;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .event-card .ec-title {
      font-size: 0.98rem;
      font-weight: bold;
      color: var(--ink);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .event-card .ec-desc {
      font-size: 0.81rem;
      color: var(--ink-soft);
      line-height: 1.6;
      clear: both;
    }
    .event-card .ec-tags {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .tag {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: bold;
      letter-spacing: 0.02em;
    }
    .tag-teologia  { background: #e4f0e4; color: #1a4a1a; }
    .tag-concilio  { background: #e4e8f4; color: #1a2a5a; }
    .tag-missao    { background: #f4ede4; color: #5a3a10; }
    .tag-reforma   { background: #f4e4e4; color: #5a1a1a; }
    .tag-politico  { background: #ede4f4; color: #3a1a5a; }
    .tag-cisma     { background: #f4e4e4; color: #5a1a1a; border: 1px solid #e0aaaa; }
    .tag-monastico { background: #e4f4ee; color: #1a4a34; }
    .tag-martir    { background: #f4e8e4; color: #5a1a0a; }

    /* ── FIGURES STRIP ──────────────────────────── */
    #figures-section {
      background: #f0ebe0;
      border-top: 3px solid #ddd0b8;
      padding: 20px 28px 16px;
    }
    #figures-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--ink-soft);
      text-align: center;
      margin-bottom: 14px;
    }
    #figures-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
      justify-content: flex-start;
    }
    #figures-scroll::-webkit-scrollbar { height: 3px; }
    #figures-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    .figure-card {
      flex-shrink: 0;
      text-align: center;
      cursor: pointer;
      padding: 4px;
      border-radius: 10px;
      transition: transform 0.15s, background 0.15s;
    }
    .figure-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.6); }
    .figure-card img {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: block;
    }
    .figure-card .fc-name {
      font-size: 0.65rem;
      font-weight: bold;
      color: var(--ink);
      margin-top: 6px;
      line-height: 1.2;
      max-width: 70px;
    }
    .figure-card .fc-year {
      font-size: 0.58rem;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    /* ── MODAL ────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(30,16,8,0.65);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    #modal-overlay.open { display: flex; }

    #modal-box {
      background: white;
      border-radius: 16px;
      padding: 0;
      max-width: 500px;
      width: 92%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      overflow: hidden;
      position: relative;
    }
    #modal-top {
      padding: 28px 28px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    #modal-portrait {
      width: 90px; height: 90px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 4px solid white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    #modal-name { font-size: 1.3rem; font-weight: bold; color: var(--ink); }
    #modal-meta { font-size: 0.8rem; color: var(--ink-soft); margin-top: 3px; font-style: italic; }
    #modal-body {
      padding: 0 28px 28px;
    }
    #modal-bio { font-size: 0.86rem; color: var(--ink-soft); line-height: 1.7; }
    #modal-contribution {
      margin-top: 16px;
      background: var(--cream);
      border-left: 4px solid var(--gold);
      padding: 12px 16px;
      border-radius: 0 8px 8px 0;
    }
    #modal-contribution h4 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-bottom: 5px;
    }
    #modal-contribution p { font-size: 0.82rem; color: var(--ink-soft); line-height: 1.6; }
    #modal-close {
      position: absolute; top: 14px; right: 16px;
      background: #f0ebe0; border: none;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 1rem; cursor: pointer; color: var(--ink-soft);
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    #modal-close:hover { background: var(--cream-dark); color: var(--ink); }

    @media (max-width: 640px) {
      .events-grid { grid-template-columns: 1fr; }
      #content-area { padding: 20px 14px; }
    }

    /* ── VER TUDO — OVERVIEW ─────────────────────── */
    .ver-tudo-tab {
      cursor: pointer;
      padding: 14px 20px 12px;
      border-right: 2px solid #ddd0b8;
      border-bottom: 4px solid transparent;
      background: #2a1808;
      text-align: center;
      white-space: nowrap;
      user-select: none;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .ver-tudo-tab:hover { background: #3a2010; }
    .ver-tudo-tab.active { border-bottom-color: var(--gold-light); }
    .ver-tudo-tab .vt-icon { font-size: 1.3rem; display: block; }
    .ver-tudo-tab .vt-label { font-size: 0.72rem; display: block; color: var(--gold); font-weight: bold; letter-spacing: 0.05em; margin-top: 2px; text-transform: uppercase; }

    #overview-area {
      flex: 1;
      overflow-x: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 20px;
      background: var(--cream);
    }
    #overview-area::-webkit-scrollbar { height: 6px; }
    #overview-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    .overview-grid {
      display: flex;
      gap: 0;
      min-width: max-content;
      align-items: stretch;
      border: 1.5px solid #d8d0c0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .ov-col {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1.5px solid #d8d0c0;
      background: white;
    }
    .ov-col:last-child { border-right: none; }

    .ov-col-header {
      padding: 12px 10px 10px;
      color: white;
      text-align: center;
      height: 165px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .ov-col-header .ov-h-left { display: flex; flex-direction: column; align-items: center; }
    .ov-col-header .ov-h-icon { font-size: 1.6rem; display: block; margin-bottom: 3px; }
    .ov-col-header .ov-h-year { font-size: 1.1rem; font-weight: bold; display: block; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
    .ov-col-header .ov-h-name { font-size: 0.65rem; display: block; opacity: 0.9; margin-top: 2px; letter-spacing: 0.03em; }
    .ov-col-header .ov-h-chevron { display: none; }
    .ov-col-body { display: flex; flex-direction: column; flex: 1; }

    .ov-events {
      flex: 1;
      padding: 12px 10px 8px 10px;
      background: #faf8f2;
      border-top: 2px solid rgba(0,0,0,0.08);
      position: relative;
    }

    /* vertical timeline spine */
    .ov-events::before {
      content: '';
      position: absolute;
      left: 29px;
      top: 16px;
      bottom: 16px;
      width: 2px;
      background: var(--ov-spine, #ccc);
      opacity: 0.35;
    }

    .ov-event {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 12px;
      cursor: default;
      position: relative;
    }
    .ov-event:last-child { margin-bottom: 4px; }

    /* Absolute-positioned events for time-aligned parallel tracks */
    .ov-event-abs {
      position: absolute;
      left: 10px;
      right: 10px;
      margin-bottom: 0 !important;
      background: #faf8f2;
      border-radius: 6px;
      transition: top 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .ov-event-abs.expanded { z-index: 5; }
    .ov-event-abs.branch-lane .oe-title { font-size: 0.7rem; }

    .branch-fork-svg, .branch-merge-svg { transition: top 0.55s cubic-bezier(0.4,0,0.2,1); }

    .oe-bubble {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--period-color, #888);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      position: relative;
      z-index: 1;
      opacity: 0.92;
    }

    .oe-body { flex: 1; padding-top: 2px; }
    .oe-year {
      font-size: 0.6rem;
      font-weight: bold;
      color: var(--gold);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
    }
    .oe-title {
      font-size: 0.76rem;
      font-weight: bold;
      color: var(--ink);
      line-height: 1.3;
      margin-top: 2px;
    }
    .oe-toggle {
      float: right;
      font-size: 0.65rem;
      color: var(--gold);
      margin-left: 4px;
      transition: transform 0.2s;
      line-height: 1.2;
    }
    .ov-event { cursor: pointer; }
    .ov-event:hover .oe-bubble { filter: brightness(1.15); }
    .ov-event.expanded .oe-toggle { transform: rotate(180deg); }
    .oe-full-desc {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      font-size: 0.68rem;
      color: var(--ink-soft);
      line-height: 1.55;
      margin-top: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.2s;
    }
    .ov-event.expanded .oe-full-desc {
      max-height: 150px;
      opacity: 1;
      margin-top: 5px;
    }

    .ov-figures {
      padding: 8px 6px 10px;
      background: #f0ebe0;
      border-top: 1.5px solid #d8d0c0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .ov-figure {
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .ov-figure:hover { transform: translateY(-3px); }
    .ov-figure img {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      display: block;
    }
    .ov-figure .of-name {
      font-size: 0.55rem;
      color: var(--ink);
      font-weight: bold;
      margin-top: 3px;
      line-height: 1.2;
      max-width: 52px;
    }

    /* ── PARALLEL BRANCH ────────────────────────── */
    .ov-col.has-parallel { width: 560px; }

    .ov-tracks {
      display: flex;
      flex: 1;
    }

    .ov-track {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .ov-track.track-parallel {
      background: #f5f3ec;
      border-left: 2px dashed #d0c8b0;
    }

    .ov-track-label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      font-size: 0.6rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .ov-track-label .tl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .track-main .ov-track-label   { background: rgba(255,255,255,0.6); color: var(--ink-soft); }
    .track-parallel .ov-track-label { background: rgba(0,0,0,0.04); }

    /* ── INLINE BRANCH (overlapping events) ──────── */
    .branch-fork-svg, .branch-merge-svg {
      display: block;
      width: 100%;
      height: 26px;
      overflow: visible;
    }
    .branch-group {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .branch-group .ov-event {
      flex: 1;
      min-width: 0;
      margin-bottom: 0 !important;
      background: #f2f0e8;
      border-radius: 6px;
      padding: 3px 3px 3px 0;
    }
    .branch-group .ov-event .oe-title { font-size: 0.7rem; }

    /* ── TOOLBAR ──────────────────────────────────── */
    .ov-toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .ov-tb-btn {
      background: var(--ink);
      color: var(--gold-light);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 0.78rem;
      font-family: Georgia, serif;
      font-weight: bold;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .ov-tb-btn:hover { background: #3a1808; border-color: var(--gold); }

    /* ── PARALLEL TRACK COLLAPSE ───────────────────── */
    .ov-track.track-parallel.collapsed {
      display: none;
    }
    .ov-col.has-parallel.parallel-collapsed { width: 280px; }

    /* Fork connector / toggle banner */
    .ov-fork-banner {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      gap: 8px;
      font-size: 0.62rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: white;
      border-top: 1.5px solid rgba(255,255,255,0.25);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      opacity: 0.92;
    }
    .ov-fork-banner:hover { background: rgba(255,255,255,0.12); opacity: 1; }
    .ov-fork-banner .fork-icon { font-size: 1rem; }
    .ov-fork-banner .fork-label { flex: 1; }
    .fork-chevron {
      font-size: 0.7rem;
      opacity: 0.7;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .ov-fork-banner:hover .fork-chevron { opacity: 1; }

    /* Collapsed state — keep row layout, just restyle as invitation */
    @keyframes hint-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.25); }
      55%       { box-shadow: 0 0 0 5px rgba(255,255,255,0); }
    }
    .ov-col.parallel-collapsed .ov-fork-banner {
      border-top: none;
      margin: 5px 8px 6px;
      border-radius: 7px;
      border: 1.5px dashed rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.1);
      opacity: 1;
      animation: hint-pulse 2.4s ease-out infinite;
    }
    .ov-col.parallel-collapsed .fork-chevron {
      opacity: 1;
      font-size: 0.8rem;
    }
    .ov-col.parallel-collapsed .ov-fork-banner:hover {
      background: rgba(255,255,255,0.2);
      border-style: solid;
    }
    .ov-col.parallel-collapsed .ov-fork-banner:hover .fork-chevron { background: white; }

    /* ── MOBILE RESPONSIVE (≤768px) ─────────────────── */
    @media (max-width: 768px) {
      #header { padding: 14px 16px 12px; }
      #header h1 { font-size: 1rem; }

      #content-area { padding: 12px 10px; overflow-x: hidden; }

      .overview-grid {
        flex-direction: column;
        min-width: unset;
        width: 100%;
        border-radius: 8px;
      }

      .ov-col {
        width: 100% !important;
        border-right: none;
        border-bottom: 1.5px solid #d8d0c0;
        flex-shrink: unset;
      }
      .ov-col:last-child { border-bottom: none; }

      /* Header becomes a horizontal tap row */
      .ov-col-header {
        height: auto !important;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        cursor: pointer;
        user-select: none;
        gap: 10px;
      }
      .ov-col-header .ov-h-left {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
      }
      .ov-col-header .ov-h-icon { font-size: 1.4rem; flex-shrink: 0; margin-bottom: 0; }
      .ov-col-header .ov-h-text { text-align: left; display: flex; flex-direction: column; }
      .ov-col-header .ov-h-year { font-size: 0.95rem; }
      .ov-col-header .ov-h-name { font-size: 0.65rem; }
      .ov-col-header .ov-h-chevron {
        display: block;
        font-size: 0.85rem;
        flex-shrink: 0;

// ── Year parsing + time-axis helpers ──
function parseYearRange(yearStr) {
  const s = (yearStr || '').replace(/d\.C\.|a\.C\./gi, '').replace(/[~≈]/g, '').trim();
  const range = s.match(/(\d+)\s*[–—-]\s*(\d+)/);
  if (range) return { start: parseInt(range[1]), end: parseInt(range[2]) };
  const num = s.match(/(\d+)/);
  const y = num ? parseInt(num[0]) : 0;
  return { start: y, end: y };
}

function parseEventYear(yearStr) {
  const s = (yearStr || '').replace(/D\.C\.|A\.C\./gi, '').replace(/[~≈]/g, '').trim();
  if (/presente/i.test(s)) return 2025;
  const range = s.match(/(\d+)\s*[–—-]\s*(\d+)/);
  if (range) return (parseInt(range[1]) + parseInt(range[2])) / 2;
  const num = s.match(/(\d+)/);
  return num ? parseInt(num[0]) : 0;
}

function calcEventPositions(events, minYear, pxPerYear, minGap = 82) {
  const positions = [];
  let lastBottom = 0;
  for (const e of events) {
    const ideal = Math.round((parseEventYear(e.year) - minYear) * pxPerYear);
    const top = Math.max(ideal, lastBottom);
    positions.push(top);
    lastBottom = top + minGap;
  }
  return positions;
}

// Use the main track's actual positions as the time ruler so parallel events
// appear at the same vertical level as matching years in the main track.
function calcParallelPositions(parallelEvents, mainEvents, mainPositions, pxPerYear, minGap = 82) {
  const mainYears = mainEvents.map(e => parseEventYear(e.year));

  function interpolate(year) {
    if (mainYears.length === 0) return year * pxPerYear;
    const first = mainYears[0], last = mainYears[mainYears.length - 1];
    if (year <= first) return Math.max(0, mainPositions[0] + (year - first) * pxPerYear);
    if (year >= last)  return mainPositions[mainPositions.length - 1] + (year - last) * pxPerYear;
    for (let i = 0; i < mainYears.length - 1; i++) {
      if (year >= mainYears[i] && year <= mainYears[i + 1]) {
        const span = mainYears[i + 1] - mainYears[i];
        const t = span === 0 ? 0 : (year - mainYears[i]) / span;
        return mainPositions[i] + t * (mainPositions[i + 1] - mainPositions[i]);
      }
    }
    return year * pxPerYear;
  }

  const positions = [];
  let lastBottom = 0;
  for (const e of parallelEvents) {
    const ideal = Math.round(interpolate(parseEventYear(e.year)));
    const top = Math.max(ideal, lastBottom);
    positions.push(top);
    lastBottom = top + minGap;
  }
  return positions;
}

// ═══════════════════════════════════════════════════════
//  SHOW OVERVIEW (Ver Tudo)

function showOverview() {
  const area = document.getElementById('content-area');
  area.style.padding = '20px';
  area.style.maxWidth = 'none';

  const cols = PERIODS.map(p => {
    const periodFigures = FIGURES.filter(f => f.period === p.id);
    const figuresHTML = periodFigures.map(f => `
      <div class="ov-figure" onclick="showFigure(${JSON.stringify(f).replace(/"/g, '&quot;')})">
        <img src="${PORTRAIT_URIS[f.file]}" alt="${f.name.replace('\n',' ')}">
        <div class="of-name">${f.name.replace('\n','<br>')}</div>
      </div>
    `).join('');

    function renderEvents(events, color) {
      const single = e => {
        const sd = e.desc.split('.')[0].trim().substring(0, 68) + '…';
        return `
          <div class="ov-event" onclick="this.classList.toggle('expanded')">
            <div class="oe-bubble" style="background:${color}">${e.icon}</div>
            <div class="oe-body">
              <div class="oe-year">${e.year} <span class="oe-toggle">▼</span></div>
              <div class="oe-title">${e.title}</div>

              <div class="oe-full-desc">${e.desc}</div>
            </div>
          </div>`;
      };
      const branch = (eA, eB) => {
        const sdA = eA.desc.split('.')[0].trim().substring(0, 44) + '…';
        const sdB = eB.desc.split('.')[0].trim().substring(0, 44) + '…';
        const sp  = `stroke="${color}" stroke-opacity="0.4" stroke-width="2" fill="none"`;
        const spd = `stroke="${color}" stroke-opacity="0.4" stroke-width="1.5" fill="none" stroke-dasharray="4,3"`;
        return `
          <svg class="branch-fork-svg" viewBox="0 0 190 26" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19,0 L19,26" ${sp}/>
            <path d="M19,0 C19,18 117,8 117,26" ${spd}/>
          </svg>
          <div class="branch-group">
            <div class="ov-event" onclick="this.classList.toggle('expanded')">
              <div class="oe-bubble" style="background:${color}">${eA.icon}</div>
              <div class="oe-body">
                <div class="oe-year">${eA.year} <span class="oe-toggle">▼</span></div>
                <div class="oe-title">${eA.title}</div>

                <div class="oe-full-desc">${eA.desc}</div>
              </div>
            </div>
            <div class="ov-event" onclick="this.classList.toggle('expanded')">
              <div class="oe-bubble" style="background:${color}">${eB.icon}</div>
              <div class="oe-body">
                <div class="oe-year">${eB.year} <span class="oe-toggle">▼</span></div>
                <div class="oe-title">${eB.title}</div>

                <div class="oe-full-desc">${eB.desc}</div>
              </div>
            </div>
          </div>
          <svg class="branch-merge-svg" viewBox="0 0 190 26" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19,0 L19,26" ${sp}/>
            <path d="M117,0 C117,18 19,8 19,26" ${spd}/>
          </svg>`;
      };
      const ranges = events.map(e => parseYearRange(e.year));
      const out = [];
      let i = 0;
      while (i < events.length) {
        const r = ranges[i], rNext = ranges[i + 1];
        if (rNext && rNext.start >= r.start && rNext.start < r.end) {
          out.push(branch(events[i], events[i + 1]));
          i += 2;
        } else {
          out.push(single(events[i]));
          i++;
        }
      }
      return out.join('');
    }

    const hasParallel = !!p.parallelTrack;

    // Detect time-overlapping pairs in an event list → returns {bLeft, bRight} Sets of indices
    function detectBranchPairs(events) {
      const bLeft = new Set(), bRight = new Set();
      const ranges = events.map(e => parseYearRange(e.year));
      for (let i = 0; i + 1 < events.length; i++) {
        if (bRight.has(i)) continue;
        const r = ranges[i], rN = ranges[i + 1];
        if (rN && rN.start >= r.start && rN.start < r.end) {
          bLeft.add(i); bRight.add(i + 1);
        }
      }
      return { bLeft, bRight };
    }

    // Compute positions skipping branch-right events (they share position with branch-left)
    function calcPosWithBranches(events, minYear, pxPerYear, bRight) {
      const filtered = events.filter((_, i) => !bRight.has(i));
      const pos = calcEventPositions(filtered, minYear, pxPerYear);
      const result = [];
      let fi = 0;
      for (let i = 0; i < events.length; i++) {
        if (bRight.has(i)) result.push(result[i - 1]);
        else result.push(pos[fi++]);
      }
      return result;
    }

    const renderAbs = (events, color, positions, bLeft = new Set(), bRight = new Set(), flowPos = null) => {
      const sp  = `stroke="${color}" stroke-opacity="0.4" stroke-width="2" fill="none"`;
      const spd = `stroke="${color}" stroke-opacity="0.4" stroke-width="1.5" fill="none" stroke-dasharray="4,3"`;
      const startPos = flowPos || positions;
      const evHTML = events.map((e, i) => {
        const isL = bLeft.has(i), isR = bRight.has(i);
        const posStyle = isL ? 'left:10px;right:50%;'
                       : isR ? 'left:calc(50% + 3px);right:5px;'
                       : 'left:10px;right:10px;';
        const maxLen = (isL || isR) ? 42 : 68;
        const sd = e.desc.split('.')[0].trim().substring(0, maxLen) + '…';
        const dataAttrs = flowPos
          ? `data-flow="${flowPos[i]}" data-time="${positions[i]}"`
          : '';
        return `
          <div class="ov-event ov-event-abs${isL||isR?' branch-lane':''}" style="top:${startPos[i]}px;${posStyle}" ${dataAttrs} onclick="this.classList.toggle('expanded')">
            <div class="oe-bubble" style="background:${color}">${e.icon}</div>
            <div class="oe-body">
              <div class="oe-year">${e.year} <span class="oe-toggle">▼</span></div>
              <div class="oe-title">${e.title}</div>

              <div class="oe-full-desc">${e.desc}</div>
            </div>
          </div>`;
      }).join('');
      const curveH = 14, eventH = 46;
      const svgHTML = [...bLeft].map(li => {
        const tTop = positions[li];
        const fTop = flowPos ? flowPos[li] : tTop;
        const startTop = flowPos ? fTop : tTop;
        const forkData = flowPos ? `data-flow="${fTop - curveH}" data-time="${tTop - curveH}"` : '';
        const mergeData = flowPos ? `data-flow="${fTop + eventH}" data-time="${tTop + eventH}"` : '';
        return `
          <svg class="branch-fork-svg" style="position:absolute;top:${startTop-curveH}px;left:0;width:100%;height:${curveH}px;overflow:visible;background:none" ${forkData} viewBox="0 0 100 ${curveH}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14,0 C14,${curveH} 61,0 61,${curveH}" ${spd}/>
          </svg>
          <svg class="branch-merge-svg" style="position:absolute;top:${startTop+eventH}px;left:0;width:100%;height:${curveH}px;overflow:visible;background:none" ${mergeData} viewBox="0 0 100 ${curveH}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M61,0 C61,${curveH} 14,0 14,${curveH}" ${spd}/>
          </svg>`;
      }).join('');
      return evHTML + svgHTML;
    };

    let bodyHTML;
    if (hasParallel) {
      const pt = p.parallelTrack;
      const allYears = [...p.events, ...pt.events].map(e => parseEventYear(e.year)).filter(y => y > 0);
      const minYear = Math.min(...allYears);
      const maxYear = Math.max(...allYears);
      const range = Math.max(maxYear - minYear, 1);
      const PX_PER_YEAR = Math.max(1.5, Math.min(5, 600 / range));
      const { bLeft, bRight } = detectBranchPairs(p.events);
      const mainPos = calcPosWithBranches(p.events, minYear, PX_PER_YEAR, bRight);
      const parallelPos = calcParallelPositions(pt.events, p.events, mainPos, PX_PER_YEAR);
      const trackHeight = Math.max(
        mainPos[mainPos.length - 1] + 130,
        parallelPos[parallelPos.length - 1] + 130
      );

      // Compact flow positions (no time gaps) — used when parallel track is collapsed
      const FLOW_GAP = 72;
      const mainFlowPos = [];
      let flowTop = 0;
      for (let i = 0; i < p.events.length; i++) {
        if (bRight.has(i)) { mainFlowPos.push(mainFlowPos[i - 1]); }
        else { mainFlowPos.push(flowTop); flowTop += FLOW_GAP; }
      }
      const flowHeight = flowTop + 55;

      // Height anchor: starts at flowHeight (collapsed), animates to trackHeight (expanded)
      const anchor = `<div class="ov-height-anchor" style="height:${flowHeight}px;width:0;flex-shrink:0;transition:height 0.55s cubic-bezier(0.4,0,0.2,1)" data-flow-h="${flowHeight}px" data-time-h="${trackHeight}px"></div>`;
      const parallelAnchor = `<div style="height:${trackHeight}px;width:0;flex-shrink:0"></div>`;
      bodyHTML = `
        <div class="ov-tracks">
          <div class="ov-track track-main">
            <div class="ov-track-label">
              <span class="tl-dot" style="background:${p.color}"></span>
              Trilha Principal
            </div>
            <div class="ov-events" style="--ov-spine:${p.color}">
              ${anchor}${renderAbs(p.events, p.color, mainPos, bLeft, bRight, mainFlowPos)}
            </div>
          </div>
          <div class="ov-track track-parallel collapsed">
            <div class="ov-track-label" style="color:${pt.color}">
              <span class="tl-dot" style="background:${pt.color}"></span>
              ⑂ ${pt.label}
            </div>
            <div class="ov-events" style="--ov-spine:${pt.color}">
              ${parallelAnchor}${renderAbs(pt.events, pt.color, parallelPos)}
            </div>
          </div>
        </div>`;
    } else {
      bodyHTML = `<div class="ov-events" style="--ov-spine:${p.color}">${renderEvents(p.events, p.color)}</div>`;
    }

    return `
      <div class="ov-col${hasParallel ? ' has-parallel parallel-collapsed' : ''}">
        <div class="ov-col-header" style="background:${p.color}" onclick="toggleMobileCol(this)">
          <div class="ov-h-left">
            <span class="ov-h-icon">${p.icon}</span>
            <div class="ov-h-text">
              <span class="ov-h-year">${p.tabYear}</span>
              <span class="ov-h-name">${p.tabName}</span>
            </div>
          </div>
          <span class="ov-h-chevron">▼</span>
          ${hasParallel ? `<div class="ov-fork-banner" onclick="event.stopPropagation();toggleParallel(this)"><span class="fork-icon">⑂</span><span class="fork-label">${p.parallelTrack.label}</span><span class="fork-chevron">▶</span></div>` : ''}
        </div>
        <div class="ov-col-body">
          ${bodyHTML}
          ${periodFigures.length ? `<div class="ov-figures">${figuresHTML}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  area.innerHTML = `
    <div class="overview-grid">${cols}</div>`;
}

function toggleAllEvents() {
  const btn = document.getElementById('expand-toggle-btn');
  const anyExpanded = !!document.querySelector('.ov-event.expanded');
  document.querySelectorAll('.ov-event').forEach(e =>
    e.classList.toggle('expanded', !anyExpanded)
  );
  btn.textContent = anyExpanded ? '▼ Expandir' : '▲ Colapsar';
}

function toggleParallel(banner) {
  const col = banner.closest('.ov-col');
  const track = col.querySelector('.ov-track.track-parallel');
  const chevron = banner.querySelector('.fork-chevron');
  const isCollapsed = track.classList.toggle('collapsed');
  col.classList.toggle('parallel-collapsed', isCollapsed);
  chevron.textContent = isCollapsed ? '▶' : '◀';

  // Animate main-track events between compact-flow and time-aligned positions
  const mainEventsEl = col.querySelector('.ov-track.track-main .ov-events');
  if (mainEventsEl) {
    mainEventsEl.querySelectorAll('.ov-event-abs[data-flow], .branch-fork-svg[data-flow], .branch-merge-svg[data-flow]').forEach(el => {
      el.style.top = (isCollapsed ? el.dataset.flow : el.dataset.time) + 'px';
    });
    const anchor = mainEventsEl.querySelector('.ov-height-anchor');
    if (anchor) anchor.style.height = isCollapsed ? anchor.dataset.flowH : anchor.dataset.timeH;
  }
}

function toggleMobileCol(header) {
  if (window.innerWidth > 768) return;
  const col = header.closest('.ov-col');
  col.classList.toggle('mobile-collapsed');
}

function initMobile() {
  if (window.innerWidth > 768) return;
  document.querySelectorAll('.ov-col').forEach(col => {
    col.classList.add('mobile-collapsed');
  });
}

// ── Init ──
showOverview();
initMobile();
</script>
</body>
</html>
