<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs><clipPath id="c"><circle cx="60" cy="60" r="56"/></clipPath></defs>
  <g clip-path="url(#c)">
    <circle cx="60" cy="60" r="60" fill="#4a3a2a"/>
    <!-- colonial black robe -->
    <path d="M0,88 Q30,80 60,78 Q90,80 120,88 L120,120 L0,120 Z" fill="#1a1a1a"/>
    <!-- white stock collar -->
    <rect x="52" y="78" width="16" height="10" rx="2" fill="#f0f0f0"/>
    <!-- colonial white wig -->
    <ellipse cx="60" cy="40" rx="30" ry="22" fill="#e0e0e0"/>
    <!-- wig curls on sides -->
    <ellipse cx="30" cy="60" rx="10" ry="18" fill="#e0e0e0"/>
    <ellipse cx="90" cy="60" rx="10" ry="18" fill="#e0e0e0"/>
    <!-- wig center part -->
    <path d="M48,32 Q54,26 60,24 Q66,26 72,32" stroke="#d0d0d0" stroke-width="1" fill="none"/>
    <!-- curly wig details -->
    <path d="M34,50 Q32,56 34,62" stroke="#d0d0d0" stroke-width="2" fill="none"/>
    <path d="M86,50 Q88,56 86,62" stroke="#d0d0d0" stroke-width="2" fill="none"/>
    <!-- face -->
    <ellipse cx="60" cy="62" rx="22" ry="24" fill="#e0c090"/>
    <!-- eyes -->
    <circle cx="52" cy="58" r="3.5" fill="white"/>
    <circle cx="68" cy="58" r="3.5" fill="white"/>
    <circle cx="52" cy="58" r="2" fill="#1a0a00"/>
    <circle cx="68" cy="58" r="2" fill="#1a0a00"/>
    <circle cx="52.8" cy="57.3" r=".8" fill="white"/>
    <circle cx="68.8" cy="57.3" r=".8" fill="white"/>
    <!-- brows -->
    <path d="M46,52 Q52,50 57,52" stroke="#8a6040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M63,52 Q68,50 74,52" stroke="#8a6040" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <circle cx="60" cy="66" r="1.5" fill="#b08060" opacity="0.5"/>
    <!-- mouth -->
    <path d="M54,73 Q60,77 66,73" stroke="#c07860" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <circle cx="60" cy="60" r="56" fill="none" stroke="white" stroke-width="4"/>
