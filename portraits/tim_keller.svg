    <rect x="63" y="48" width="18" height="12" rx="3" fill="white" stroke="#3a2a10" stroke-width="1.5"/>
    <line x1="61" y1="54" x2="63" y2="54" stroke="#3a2a10" stroke-width="1.5"/>
    <line x1="43" y1="54" x2="38" y2="52" stroke="#3a2a10" stroke-width="1.5"/>
    <line x1="81" y1="54" x2="86" y2="52" stroke="#3a2a10" stroke-width="1.5"/>
    <!-- eyes behind glasses -->
    <circle cx="52" cy="54" r="2.5" fill="#1a0a00"/>
    <circle cx="72" cy="54" r="2.5" fill="#1a0a00"/>
    <circle cx="52.8" cy="53" r="1" fill="white"/>
    <circle cx="72.8" cy="53" r="1" fill="white"/>
    <!-- brows (white/gray) -->
    <path d="M44,46 Q52,44 57,46" stroke="#c0c0c0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M65,46 Q72,44 78,46" stroke="#c0c0c0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
