<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs><clipPath id="c"><circle cx="60" cy="60" r="56"/></clipPath></defs>
  <g clip-path="url(#c)">
    <circle cx="60" cy="60" r="60" fill="#1a2a4a"/>
