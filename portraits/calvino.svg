    <!-- white collar -->
    <path d="M48,78 Q60,76 72,78 L70,86 Q60,82 50,86 Z" fill="#f0f0f0"/>
    <!-- face -->
    <ellipse cx="60" cy="60" rx="23" ry="26" fill="#dab080"/>
    <!-- small dark beard (chin) -->
    <path d="M44,74 Q60,80 76,74 Q76,86 60,90 Q44,86 44,74Z" fill="#2a1a00"/>
    <!-- eyes (sharp, intellectual) -->
    <circle cx="52" cy="55" r="3.5" fill="white"/>
    <circle cx="68" cy="55" r="3.5" fill="white"/>
    <circle cx="52" cy="55" r="2.2" fill="#1a0a00"/>
    <circle cx="68" cy="55" r="2.2" fill="#1a0a00"/>
    <circle cx="52.8" cy="54.3" r=".8" fill="white"/>
    <circle cx="68.8" cy="54.3" r=".8" fill="white"/>
    <!-- brows -->
    <path d="M46,49 Q52,47 57,49" stroke="#2a1a00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M63,49 Q68,47 74,49" stroke="#2a1a00" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- nose -->
