    <!-- mouth -->
    <path d="M54,69 Q60,73 66,69" stroke="#b07860" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <circle cx="60" cy="60" r="56" fill="none" stroke="white" stroke-width="4"/>
