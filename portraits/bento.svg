<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs><clipPath id="c"><circle cx="60" cy="60" r="56"/></clipPath></defs>
  <g clip-path="url(#c)">
    <circle cx="60" cy="60" r="60" fill="#2a2a2a"/>
    <!-- black Benedictine hood -->
    <path d="M24,58 C24,28 40,16 60,16 C80,16 96,28 96,58 C90,42 78,34 60,34 C42,34 30,42 24,58Z" fill="#1a1a1a"/>
    <!-- hood sides hanging -->
    <ellipse cx="30" cy="68" rx="12" ry="18" fill="#1a1a1a"/>
    <ellipse cx="90" cy="68" rx="12" ry="18" fill="#1a1a1a"/>
    <!-- clothing -->
    <path d="M0,88 Q30,80 60,78 Q90,80 120,88 L120,120 L0,120 Z" fill="#1a1a1a"/>
    <!-- cross -->
    <line x1="57" y1="86" x2="63" y2="86" stroke="#c8a040" stroke-width="2.5"/>
    <line x1="60" y1="82" x2="60" y2="92" stroke="#c8a040" stroke-width="2.5"/>
    <!-- face -->
    <ellipse cx="60" cy="58" rx="22" ry="25" fill="#e0c090"/>
    <!-- tonsure ring of hair (visible below hood) -->
    <path d="M38,54 Q36,40 46,36 Q54,32 60,32 Q66,32 74,36 Q84,40 82,54 Q78,44 60,42 Q42,44 38,54Z" fill="#4a3020"/>
    <!-- bald center patch (bg color showing) -->
    <ellipse cx="60" cy="36" rx="12" ry="8" fill="#2a2a2a"/>
    <!-- eyes -->
    <circle cx="52" cy="54" r="3.5" fill="white"/>
    <circle cx="68" cy="54" r="3.5" fill="white"/>
    <circle cx="52" cy="54" r="2" fill="#1a0a00"/>
    <circle cx="68" cy="54" r="2" fill="#1a0a00"/>
    <circle cx="52.8" cy="53.3" r=".8" fill="white"/>
    <circle cx="68.8" cy="53.3" r=".8" fill="white"/>
    <!-- brows -->
    <path d="M46,48 Q52,46 57,48" stroke="#4a3020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M63,48 Q68,46 74,48" stroke="#4a3020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <circle cx="60" cy="62" r="1.5" fill="#b08060" opacity="0.5"/>
    <!-- mouth (serene) -->
    <path d="M54,68 Q60,73 66,68" stroke="#c07860" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <circle cx="60" cy="60" r="56" fill="none" stroke="white" stroke-width="4"/>
